name: Update Contribution SVG

on:
  schedule:
    - cron: "0 0 * * *"   # runs every day at midnight UTC
  workflow_dispatch:        # allows manual trigger from Actions tab
  push:
    paths:
      - "generate_contributions.py"   # re-runs if script is updated

permissions:
  contents: write           # needed to commit the SVG back

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout profile repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate contributions.svg
        env:
          GITHUB_TOKEN: ${{ secrets.CONTRIB_TOKEN }}
          GITHUB_USERNAME: digvijay-y
        run: python generate_contributions.py

      - name: Commit & push SVG if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add contributions.svg
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: update contributions SVG [skip ci]"
          git push
